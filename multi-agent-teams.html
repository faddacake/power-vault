<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Vault — Multi-Agent Team Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f8;--muted:#8888aa;
  --accent:#7c6ef0;--accent2:#a99cf5;--accent-bg:rgba(124,110,240,0.12);--accent-border:rgba(124,110,240,0.35);
  --success:#4ade80;
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;min-height:100vh}
header{border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);z-index:100}
.logo{font-family:var(--display);font-size:15px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase}
.logo span{color:var(--accent2)}
main{max-width:800px;margin:0 auto;padding:40px 24px 80px}
h1{font-family:var(--display);font-size:28px;font-weight:800;margin-bottom:8px}
.subtitle{color:var(--muted);font-size:14px;margin-bottom:36px;line-height:1.7}
/* PRESETS */
.preset-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:36px}
.preset-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px;cursor:pointer;transition:border-color 0.15s}
.preset-card:hover{border-color:var(--accent-border)}
.preset-card.active{border-color:var(--accent);background:var(--accent-bg)}
.preset-name{font-family:var(--display);font-size:14px;font-weight:700;margin-bottom:4px}
.preset-desc{font-size:12px;color:var(--muted)}
/* AGENTS */
.agents-grid{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.agent-card{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:18px 20px}
.agent-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.agent-emoji{font-size:24px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--bg3);border-radius:8px}
.agent-name-input{font-family:var(--display);font-size:16px;font-weight:700;background:transparent;border:none;color:var(--text);outline:none;border-bottom:1px solid var(--border2);padding:2px 4px;min-width:180px}
.agent-delete{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:4px;transition:color 0.15s}
.agent-delete:hover{color:#f87171}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.field{margin-bottom:10px}
textarea,input[type=text]{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 11px;outline:none;transition:border 0.2s;resize:vertical}
textarea:focus,input[type=text]:focus{border-color:var(--accent)}
textarea::placeholder,input::placeholder{color:var(--muted);opacity:0.5}
/* ADD AGENT */
.add-agent-btn{width:100%;border:1px dashed var(--accent-border);border-radius:10px;padding:14px;text-align:center;color:var(--accent2);font-size:13px;cursor:pointer;transition:all 0.15s;background:transparent;margin-bottom:24px}
.add-agent-btn:hover{background:var(--accent-bg)}
/* TASK INPUT */
.task-box{background:var(--bg2);border:1px solid var(--accent-border);border-radius:10px;padding:20px 24px;margin-bottom:24px}
.task-box h3{font-family:var(--display);font-size:15px;font-weight:700;margin-bottom:12px;color:var(--accent2)}
/* BUTTONS */
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn-primary{background:var(--accent);color:white;border:none;border-radius:8px;padding:11px 26px;font-size:14px;font-family:var(--display);font-weight:700;letter-spacing:0.04em;cursor:pointer;text-transform:uppercase;transition:opacity 0.2s}
.btn-primary:hover{opacity:0.88}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);border-radius:8px;padding:11px 22px;font-size:14px;cursor:pointer;transition:all 0.15s}
.btn-ghost:hover{color:var(--text);border-color:var(--accent-border)}
/* OUTPUT */
.output-block{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;overflow:hidden;margin-top:24px}
.output-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg3)}
.output-filename{font-family:var(--mono);font-size:12px;color:var(--accent2)}
.copy-btn{font-family:var(--mono);font-size:11px;color:var(--muted);background:transparent;border:1px solid var(--border2);border-radius:5px;padding:4px 10px;cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.06em}
.copy-btn:hover{color:var(--accent2);border-color:var(--accent-border)}
.copy-btn.copied{color:#4ade80;border-color:#4ade80}
.output-code{font-family:var(--mono);font-size:12.5px;color:#c8c8e8;padding:16px;white-space:pre-wrap;word-break:break-word;max-height:500px;overflow-y:auto;line-height:1.7}
.section-label{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;margin-top:32px}
hr{border:none;border-top:1px solid var(--border);margin:32px 0}
</style>
</head>
<body>
<header>
  <div class="logo">Power <span>Vault</span></div>
  <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">Multi-Agent Team Builder</span>
</header>
<main>
  <h1>Build your AI team.</h1>
  <p class="subtitle">Configure a multi-agent team, assign roles, and generate the Claude prompt that makes them work together. Based on Garry Tan's gstack open-source team.</p>

  <div class="section-label">Start with a preset</div>
  <div class="preset-grid" id="preset-grid"></div>

  <div class="section-label">Your team</div>
  <div class="agents-grid" id="agents-grid"></div>
  <button class="add-agent-btn" onclick="addAgent()">+ Add custom agent</button>

  <div class="task-box">
    <h3>Task for this team</h3>
    <div class="field"><label>What do you need this team to do?</label>
    <textarea id="team-task" rows="3" placeholder="e.g. Build a landing page for Power Vault v2. CEO challenges scope, PM defines requirements, Designer creates mockup, Engineer builds HTML, QA tests it."></textarea></div>
    <div class="field" style="margin-top:8px"><label>Output format preference</label>
    <input type="text" id="output-pref" placeholder="e.g. Interactive HTML with Tailwind, deployed to a single file"></div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="generatePrompt()">Generate team prompt →</button>
    <button class="btn-ghost" onclick="resetAgents()">Reset</button>
  </div>

  <div id="output-wrap" style="display:none">
    <div class="output-block">
      <div class="output-header">
        <span class="output-filename">Agents/team-prompt.md</span>
        <button class="copy-btn" id="copy-btn" onclick="copyOut()">Copy</button>
      </div>
      <div class="output-code" id="output-code"></div>
    </div>
  </div>
</main>

<script>
const PRESETS = [
  {name:'gstack Product Team', desc:'Garry Tan\'s open-source 6-agent team', agents:[
    {emoji:'👑',name:'CEO',role:'Challenges every decision. Asks: is this the right thing to build? Pushes back on scope creep.',tools:'Strategic thinking, first principles'},
    {emoji:'📋',name:'PM',role:'Defines requirements, writes specs, prioritizes ruthlessly. Owns the roadmap.',tools:'Requirements docs, user stories, prioritization'},
    {emoji:'🎨',name:'Designer',role:'Creates UI variants, ensures accessibility, maintains visual consistency.',tools:'HTML/CSS mockups, design systems'},
    {emoji:'⚙️',name:'Engineer',role:'Builds the feature. Writes clean, tested, documented code.',tools:'HTML, CSS, JS, or relevant stack'},
    {emoji:'📄',name:'Doc Engineer',role:'Writes changelogs, README updates, and user-facing documentation.',tools:'Markdown, clear writing'},
    {emoji:'🧪',name:'QA Lead',role:'Tests everything. Finds edge cases, accessibility issues, and regressions.',tools:'Test cases, browser testing, checklists'},
  ]},
  {name:'Trading Team', desc:'Quant analysis + execution agents', agents:[
    {emoji:'📊',name:'Quant Analyst',role:'Analyzes market data, identifies patterns, builds models.',tools:'Python, pandas, statistical analysis'},
    {emoji:'⚡',name:'Signal Generator',role:'Translates analysis into actionable buy/sell signals with confidence scores.',tools:'Signal frameworks, probability scoring'},
    {emoji:'🛡️',name:'Risk Manager',role:'Validates every trade idea. Enforces position sizing and stop-loss rules.',tools:'Risk frameworks, Kelly criterion'},
    {emoji:'📰',name:'News Monitor',role:'Tracks relevant news and catalysts that affect positions.',tools:'Web search, sentiment analysis'},
  ]},
  {name:'Content Team', desc:'Research, write, edit, publish', agents:[
    {emoji:'🔍',name:'Researcher',role:'Gathers facts, finds primary sources, verifies claims.',tools:'Web search, source evaluation'},
    {emoji:'✍️',name:'Writer',role:'Drafts content in the owner\'s voice. No AI slop.',tools:'Writing, storytelling, tone matching'},
    {emoji:'✂️',name:'Editor',role:'Cuts ruthlessly. Improves clarity, fixes structure, eliminates filler.',tools:'Editing, brevity, structure'},
    {emoji:'📢',name:'Publisher',role:'Formats for platform, writes hooks, schedules distribution.',tools:'Platform-specific formatting, hooks'},
  ]},
];

let agents = [];
let activePreset = null;

function renderPresets() {
  const el = document.getElementById('preset-grid');
  el.innerHTML = '';
  PRESETS.forEach((p,i) => {
    const card = document.createElement('div');
    card.className = 'preset-card'+(activePreset===i?' active':'');
    card.innerHTML = `<div class="preset-name">${p.name}</div><div class="preset-desc">${p.desc}</div>`;
    card.onclick = () => { activePreset=i; agents=[...p.agents.map(a=>({...a}))]; renderPresets(); renderAgents(); };
    el.appendChild(card);
  });
}

function renderAgents() {
  const el = document.getElementById('agents-grid');
  el.innerHTML = '';
  agents.forEach((agent, i) => {
    const card = document.createElement('div');
    card.className = 'agent-card';
    card.innerHTML = `
      <div class="agent-header">
        <div class="agent-emoji">${agent.emoji}</div>
        <input class="agent-name-input" value="${agent.name}" oninput="agents[${i}].name=this.value" placeholder="Agent name">
        <button class="agent-delete" onclick="agents.splice(${i},1);renderAgents()">✕</button>
      </div>
      <div class="field"><label>Role & responsibilities</label>
        <textarea rows="2" oninput="agents[${i}].role=this.value" placeholder="What does this agent do?">${agent.role||''}</textarea>
      </div>
      <div class="field"><label>Tools / methods</label>
        <input type="text" value="${agent.tools||''}" oninput="agents[${i}].tools=this.value" placeholder="e.g. Python, web search, HTML">
      </div>
    `;
    el.appendChild(card);
  });
}

function addAgent() {
  agents.push({emoji:'🤖',name:'New Agent',role:'',tools:''});
  renderAgents();
}

function resetAgents() {
  agents=[]; activePreset=null;
  renderPresets(); renderAgents();
  document.getElementById('output-wrap').style.display='none';
}

function generatePrompt() {
  if(!agents.length) return alert('Add at least one agent first.');
  const task = document.getElementById('team-task').value.trim();
  const outputPref = document.getElementById('output-pref').value.trim();
  const teamName = activePreset!==null ? PRESETS[activePreset].name : 'Custom Team';

  const agentDefs = agents.map(a =>
    `### ${a.emoji} ${a.name}\n**Role**: ${a.role||'(not set)'}\n**Tools**: ${a.tools||'(not set)'}`
  ).join('\n\n');

  const collab = agents.map(a=>`- ${a.emoji} **${a.name}**`).join('\n');

  const prompt = `# Multi-Agent Team Prompt — ${teamName}
*Generated by Power Vault*

## Instructions for Claude
You are operating as a multi-agent team inside Power Vault. Follow CLAUDE.md. Read all Memory files before proceeding.

For this task, simulate the following team working together. Each agent speaks in turn, challenges assumptions, and hands off to the next. The output should reflect genuine specialist collaboration — not one generic voice.

## Team composition
${agentDefs}

## Collaboration order
${collab}

## Task
${task||'(define your task here)'}

## Output format
${outputPref||'Interactive HTML preferred unless specified otherwise'}

## Rules
- Each agent must contribute their specialist perspective
- CEO challenges scope before work begins
- QA (or equivalent) validates the final output
- Surface conflicts and disagreements explicitly — don't smooth them over
- Final output should be production-ready, not a draft

Begin.`;

  document.getElementById('output-code').textContent = prompt;
  document.getElementById('output-wrap').style.display = 'block';
  document.getElementById('output-wrap').scrollIntoView({behavior:'smooth'});
}

function copyOut() {
  navigator.clipboard.writeText(document.getElementById('output-code').textContent).then(()=>{
    const btn=document.getElementById('copy-btn');
    btn.textContent='Copied!';btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);
  });
}

renderPresets();
renderAgents();
</script>
</body>
</html>
