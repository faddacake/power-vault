<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Vault — Meeting Notes</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--bg2:#111118;--bg3:#1a1a24;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  --text:#f0f0f8;--muted:#8888aa;
  --accent:#7c6ef0;--accent2:#a99cf5;--accent-bg:rgba(124,110,240,0.12);--accent-border:rgba(124,110,240,0.35);
  --mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;--display:'Syne',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;line-height:1.6;min-height:100vh}
header{border-bottom:1px solid var(--border);padding:18px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:rgba(10,10,15,0.92);backdrop-filter:blur(12px);z-index:100}
.logo{font-family:var(--display);font-size:15px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase}
.logo span{color:var(--accent2)}
main{max-width:700px;margin:0 auto;padding:40px 24px 80px}
.section-label{font-family:var(--mono);font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;margin-top:28px}
.section-label:first-of-type{margin-top:0}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px;font-weight:500}
input[type=text],input[type=date],input[type=time],textarea,select{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:14px;padding:9px 13px;outline:none;transition:border 0.2s;resize:vertical}
input:focus,textarea:focus{border-color:var(--accent);background:var(--bg3)}
input::placeholder,textarea::placeholder{color:var(--muted);opacity:0.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
/* ACTION ITEMS */
.action-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.action-row{display:flex;gap:8px;align-items:flex-start}
.action-row input{flex:1}
.action-row input.owner{max-width:140px}
.action-row input.due{max-width:120px}
.remove-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:9px 4px;line-height:1;transition:color 0.15s}
.remove-btn:hover{color:#f87171}
.add-row-btn{font-size:13px;color:var(--accent2);background:none;border:1px dashed var(--accent-border);border-radius:6px;padding:7px 14px;cursor:pointer;width:100%;transition:all 0.15s}
.add-row-btn:hover{background:var(--accent-bg)}
/* ATTENDEES */
.attendee-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.attendee-tag{font-size:13px;padding:4px 12px;border-radius:99px;background:var(--accent-bg);border:1px solid var(--accent-border);color:var(--accent2);display:flex;align-items:center;gap:6px}
.attendee-tag button{background:none;border:none;color:var(--accent2);cursor:pointer;font-size:12px;padding:0;line-height:1}
.attendee-input-row{display:flex;gap:8px}
.attendee-input-row input{flex:1}
/* BUTTONS */
.btn-row{display:flex;gap:10px;margin-top:36px;flex-wrap:wrap}
.btn-primary{background:var(--accent);color:white;border:none;border-radius:8px;padding:11px 26px;font-size:14px;font-family:var(--display);font-weight:700;letter-spacing:0.04em;cursor:pointer;text-transform:uppercase;transition:opacity 0.2s}
.btn-primary:hover{opacity:0.88}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border2);border-radius:8px;padding:11px 22px;font-size:14px;font-family:var(--sans);cursor:pointer;transition:all 0.15s}
.btn-ghost:hover{color:var(--text);border-color:var(--accent-border)}
/* OUTPUT */
.output-wrap{display:none;margin-top:32px}
.output-block{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;overflow:hidden}
.output-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--bg3)}
.output-filename{font-family:var(--mono);font-size:12px;color:var(--accent2)}
.copy-btn{font-family:var(--mono);font-size:11px;color:var(--muted);background:transparent;border:1px solid var(--border2);border-radius:5px;padding:4px 10px;cursor:pointer;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.06em}
.copy-btn:hover{color:var(--accent2);border-color:var(--accent-border)}
.copy-btn.copied{color:#4ade80;border-color:#4ade80}
.output-code{font-family:var(--mono);font-size:12.5px;color:#c8c8e8;padding:16px;white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto;line-height:1.7}
</style>
</head>
<body>
<header>
  <div class="logo">Power <span>Vault</span></div>
  <span style="font-family:var(--mono);font-size:11px;color:var(--muted)">Meeting Note Template</span>
</header>
<main>
  <div class="section-label">Meeting details</div>
  <div class="field-row">
    <div class="field"><label>Meeting title</label><input type="text" id="mtg-title" placeholder="e.g. Q2 Strategy Review"></div>
    <div class="field"><label>Type</label>
      <select id="mtg-type">
        <option>1:1</option><option>Team sync</option><option>Client call</option><option>Brainstorm</option><option>Decision meeting</option><option>Kickoff</option><option>Retrospective</option><option>Other</option>
      </select>
    </div>
  </div>
  <div class="field-row3">
    <div class="field"><label>Date</label><input type="date" id="mtg-date"></div>
    <div class="field"><label>Start time</label><input type="time" id="mtg-start"></div>
    <div class="field"><label>Duration</label>
      <select id="mtg-duration">
        <option>15 min</option><option>30 min</option><option>45 min</option><option selected>1 hour</option><option>90 min</option><option>2 hours</option><option>Half day</option>
      </select>
    </div>
  </div>

  <div class="section-label">Attendees</div>
  <div class="attendee-tags" id="attendee-tags"></div>
  <div class="attendee-input-row">
    <input type="text" id="attendee-input" placeholder="Add name and press Enter…">
    <button class="btn-ghost" style="padding:9px 16px;font-size:13px;" onclick="addAttendee()">Add</button>
  </div>

  <div class="section-label">Agenda</div>
  <div class="field"><textarea id="agenda" rows="3" placeholder="1. Review last week's progress&#10;2. Discuss blockers&#10;3. Set priorities for next sprint"></textarea></div>

  <div class="section-label">Notes</div>
  <div class="field"><textarea id="notes" rows="6" placeholder="Key points discussed, decisions made, context…"></textarea></div>

  <div class="section-label">Decisions made</div>
  <div class="field"><textarea id="decisions" rows="3" placeholder="- Decided to ship v2 by end of month&#10;- Agreed to pause the ads experiment"></textarea></div>

  <div class="section-label">Action items</div>
  <div class="action-list" id="action-list"></div>
  <button class="add-row-btn" onclick="addAction()">+ Add action item</button>

  <div class="section-label">Follow-up needed?</div>
  <div class="field-row">
    <div class="field"><label>Next meeting date</label><input type="date" id="next-date"></div>
    <div class="field"><label>Sent to</label><input type="text" id="sent-to" placeholder="e.g. team@company.com"></div>
  </div>

  <div class="btn-row">
    <button class="btn-primary" onclick="generate()">Generate note →</button>
    <button class="btn-ghost" onclick="clearAll()">Clear</button>
  </div>

  <div class="output-wrap" id="output-wrap">
    <div class="output-block">
      <div class="output-header">
        <span class="output-filename" id="out-filename">meeting-note.md</span>
        <button class="copy-btn" id="copy-btn" onclick="copyOut()">Copy</button>
      </div>
      <div class="output-code" id="output-code"></div>
    </div>
  </div>
</main>

<script>
// Set today's date
document.getElementById('mtg-date').value = new Date().toISOString().split('T')[0];

// Attendees
const attendees = [];
document.getElementById('attendee-input').addEventListener('keydown', e => { if(e.key==='Enter') addAttendee(); });
function addAttendee() {
  const input = document.getElementById('attendee-input');
  const val = input.value.trim();
  if(!val) return;
  attendees.push(val);
  input.value = '';
  renderAttendees();
}
function renderAttendees() {
  const el = document.getElementById('attendee-tags');
  el.innerHTML = '';
  attendees.forEach((a,i) => {
    const tag = document.createElement('span');
    tag.className = 'attendee-tag';
    tag.innerHTML = `${a}<button onclick="removeAttendee(${i})">✕</button>`;
    el.appendChild(tag);
  });
}
function removeAttendee(i) { attendees.splice(i,1); renderAttendees(); }

// Actions
let actionCount = 0;
function addAction() {
  actionCount++;
  const list = document.getElementById('action-list');
  const row = document.createElement('div');
  row.className = 'action-row';
  row.id = 'action-'+actionCount;
  row.innerHTML = `
    <input type="text" placeholder="Action item…" class="action-text">
    <input type="text" placeholder="Owner" class="owner">
    <input type="date" class="due">
    <button class="remove-btn" onclick="document.getElementById('action-${actionCount}').remove()">✕</button>
  `;
  list.appendChild(row);
}
addAction();

function getActions() {
  return [...document.querySelectorAll('.action-row')].map(row => ({
    text: row.querySelector('.action-text').value.trim(),
    owner: row.querySelector('.owner').value.trim(),
    due: row.querySelector('.due').value,
  })).filter(a => a.text);
}

function generate() {
  const v = id => document.getElementById(id).value.trim();
  const title = v('mtg-title') || 'Untitled Meeting';
  const date = v('mtg-date') || 'No date';
  const type = v('mtg-type');
  const start = v('mtg-start');
  const duration = v('mtg-duration');
  const agenda = v('agenda');
  const notes = v('notes');
  const decisions = v('decisions');
  const nextDate = v('next-date');
  const sentTo = v('sent-to');
  const attendeeList = attendees.length ? attendees.map(a=>'- '+a).join('\n') : '- (none listed)';
  const actions = getActions();
  const actionLines = actions.length ? actions.map(a=>`- [ ] ${a.text}${a.owner?' — **'+a.owner+'**':''}${a.due?' (due: '+a.due+')':''}`).join('\n') : '- (none)';

  const slug = title.toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,'');
  document.getElementById('out-filename').textContent = `${date}-${slug}.md`;

  const md = `# ${title}

**Date**: ${date}${start ? ' at ' + start : ''}  
**Duration**: ${duration}  
**Type**: ${type}  

## Attendees
${attendeeList}

## Agenda
${agenda || '(not set)'}

## Notes
${notes || '(none)'}

## Decisions
${decisions || '(none)'}

## Action items
${actionLines}

${nextDate ? `## Follow-up\n**Next meeting**: ${nextDate}${sentTo ? '\n**Notes sent to**: ' + sentTo : ''}` : ''}
---
*Generated with Power Vault*`;

  document.getElementById('output-code').textContent = md;
  document.getElementById('output-wrap').style.display = 'block';
  document.getElementById('output-wrap').scrollIntoView({behavior:'smooth'});
}

function copyOut() {
  navigator.clipboard.writeText(document.getElementById('output-code').textContent).then(()=>{
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='Copy';btn.classList.remove('copied');},2000);
  });
}

function clearAll() {
  ['mtg-title','agenda','notes','decisions','next-date','sent-to','attendee-input'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('mtg-date').value = new Date().toISOString().split('T')[0];
  attendees.length = 0; renderAttendees();
  document.getElementById('action-list').innerHTML = ''; actionCount = 0; addAction();
  document.getElementById('output-wrap').style.display = 'none';
}
</script>
</body>
</html>
